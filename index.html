<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Ranker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 id="app-title">NFL Team Ranker</h1>
  <span>Drag teams onto the chart &nbsp;·&nbsp; Drag off the chart to remove</span>
  <div class="sport-toggle">
    <button class="btn-toggle active" data-sport="nfl">NFL</button>
    <button class="btn-toggle" data-sport="mlb">MLB</button>
    <button class="btn-toggle" data-sport="nba">NBA</button>
  </div>
</header>

<div class="layout">
  <div class="chart-side">
    <div class="chart-wrap">
      <div id="chart"></div>
      <div class="xlabel">Goodness &rarr;</div>
      <div class="ylabel">Likeability &uarr;</div>
    </div>
  </div>

  <div class="tray-side">
    <div class="tray-head">
      <strong>Teams</strong>
      <div class="tray-count" id="tray-count">0 / 32 placed</div>
    </div>
    <div class="tray-scroll" id="tray"></div>
    <div class="save-footer">
      <button class="btn-save" id="btn-save" disabled>Save Rankings</button>
      <button class="btn-clear" id="btn-clear" disabled>Clear All</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <h2>NFL Team Rankings</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <table class="modal-table" id="modal-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>Goodness</th>
            <th>Likeability</th>
          </tr>
        </thead>
        <tbody id="modal-tbody"></tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn-copy" id="btn-copy">Copy CSV</button>
      <button class="btn-dl" id="btn-dl">Download CSV</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
